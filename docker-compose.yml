services:
  backend:
    build:
      context: ./backend
    image: real-estate-ai-backend:latest
    env_file:
      - ./backend/.env
    environment:
      RAG_STORE_PATH: /app/.rag_store/listing_chunks.json
      CORS_ORIGINS: http://localhost:5173,http://localhost:8080
    ports:
      - "8000:8000"
    volumes:
      - rag-data:/app/.rag_store
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: http://localhost:8000
    image: real-estate-ai-frontend:latest
    ports:
      - "8080:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  rag-data:
