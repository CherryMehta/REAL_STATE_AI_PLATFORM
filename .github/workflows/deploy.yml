name: Build and Deploy to EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build & Push Backend
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/real-estate-ai-backend ./backend
          docker push ${{ secrets.DOCKER_USERNAME }}/real-estate-ai-backend

      - name: Build & Push Frontend
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/real-estate-ai-frontend ./frontend
          docker push ${{ secrets.DOCKER_USERNAME }}/real-estate-ai-frontend

      - name: Deploy on EC2
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            echo "Pulling latest images..."
            docker pull ${{ secrets.DOCKER_USERNAME }}/real-estate-ai-backend
            docker pull ${{ secrets.DOCKER_USERNAME }}/real-estate-ai-frontend

            echo "Stopping old containers..."
            docker stop backend || true
            docker stop frontend || true
            docker rm backend || true
            docker rm frontend || true

            echo "Running backend..."
            docker run -d -p 8000:8000 \
              -e GROQ_API_KEY=${{ secrets.GROQ_API_KEY }} \
              -e GROQ_MODEL=llama-3.3-70b-versatile \
              -e GROQ_TEMPERATURE=0.2 \
              --name backend \
              ${{ secrets.DOCKER_USERNAME }}/real-estate-ai-backend

            echo "Running frontend..."
            docker run -d -p 3000:3000 \
              --name frontend \
              ${{ secrets.DOCKER_USERNAME }}/real-estate-ai-frontend